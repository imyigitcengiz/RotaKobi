<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifre sıfırlama | {{ site_settings.site_name }}</title>
    {% load static %}
    {% include 'common/erp_head_assets.html' %}
</head>
<body class="erp-app erp-theme-sky min-h-screen bg-slate-100 flex items-center justify-center p-4">
    <div class="w-full max-w-md">
        <div class="text-center mb-8">
            <a href="{% url 'login' %}" class="inline-flex items-center gap-2 text-sm text-slate-500 hover:text-brand-600 mb-4">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Giriş sayfası
            </a>
            <h1 class="text-2xl font-bold text-slate-900">Şifre sıfırlama</h1>
            <p class="text-sm text-slate-500 mt-2">E-posta adresinize sıfırlama bağlantısı gönderilir.</p>
        </div>
        <div class="bg-white rounded-3xl border border-slate-200 shadow-xl p-8">
            <form method="post" class="space-y-5">
                {% csrf_token %}
                {% if form.email.errors %}<div class="p-3 rounded-xl bg-red-50 text-red-700 text-sm">{{ form.email.errors.0 }}</div>{% endif %}
                <div>
                    <label class="text-sm font-semibold text-slate-700" for="id_email">E-posta</label>
                    <div class="mt-1.5">{{ form.email }}</div>
                </div>
                <button type="submit" class="w-full py-3 rounded-xl bg-brand-600 text-white font-bold hover:bg-brand-700 transition-colors">Bağlantı gönder</button>
            </form>
        </div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
