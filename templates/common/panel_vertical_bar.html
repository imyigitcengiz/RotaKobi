{# Kurulum profili — salt okunur; değişiklik yalnızca Modül Merkezi #}
<section class="mb-8">
    <div class="flex flex-wrap items-center justify-between gap-4">
        <div class="flex items-center gap-3">
            {% if panel_vertical %}
            <span class="w-10 h-10 rounded-xl bg-slate-900 text-white flex items-center justify-center">
                <i data-lucide="{{ panel_vertical.icon }}" class="w-5 h-5"></i>
            </span>
            <div>
                <p class="text-xs font-bold uppercase tracking-wider text-slate-500">Kurulum profili</p>
                <h3 class="text-lg font-bold text-slate-900">{{ panel_vertical.name }}</h3>
                <p class="text-sm text-slate-500">{{ panel_vertical.tagline }}</p>
            </div>
            {% endif %}
        </div>
        {% if can_manage_modules %}
        <a href="{% url 'module_hub' %}" class="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl bg-violet-600 text-white text-sm font-bold hover:bg-violet-700 shadow-sm">
            <i data-lucide="layout-grid" class="w-4 h-4"></i> Modül Merkezi
        </a>
        {% endif %}
    </div>
</section>
