{% if messages %}
<div class="fixed top-4 right-4 z-[200] space-y-2 max-w-md pointer-events-none" role="status" aria-live="polite">
    {% for message in messages %}
    <div class="pointer-events-auto px-5 py-3 rounded-2xl shadow-xl border text-sm font-semibold flex items-center gap-3 {% if message.tags == 'success' %}bg-emerald-50 border-emerald-200 text-emerald-800{% elif message.tags == 'error' %}bg-red-50 border-red-200 text-red-800{% else %}bg-sky-50 border-sky-200 text-sky-900{% endif %}">
        <i data-lucide="{% if message.tags == 'success' %}check-circle{% elif message.tags == 'error' %}alert-circle{% else %}info{% endif %}" class="w-5 h-5 shrink-0"></i>
        <span>{{ message }}</span>
    </div>
    {% endfor %}
</div>
{% endif %}
