{% comment %}
CSV indir / yükle — mobilde yatay kaydırmalı şerit.
{% if import_type %}
{% include 'common/csv_io_buttons.html' with import_type='finance' export_url=export_url %}
{% endif %}
{% endcomment %}
{% if import_type %}
<div class="erp-csv-io" role="group" aria-label="CSV işlemleri">
    {% if export_url %}
    <a href="{{ export_url }}" class="erp-csv-io__btn erp-csv-io__btn--download erp-touch-target">
        <i data-lucide="download" class="w-4 h-4 shrink-0" aria-hidden="true"></i>
        <span>CSV indir</span>
    </a>
    {% endif %}
    <a href="{% url 'csv_import_wizard' %}?type={{ import_type }}&next={{ request.get_full_path|urlencode }}"
       class="erp-csv-io__btn erp-csv-io__btn--upload erp-touch-target">
        <i data-lucide="upload" class="w-4 h-4 shrink-0" aria-hidden="true"></i>
        <span>CSV yükle</span>
    </a>
</div>
{% endif %}
