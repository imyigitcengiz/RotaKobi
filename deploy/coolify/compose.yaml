# Coolify → Compose path: docker-compose.yml (repo kökü — önerilen)
# Alternatif: bu dosya (build context repo köküne göre ayarlı)
name: kobi-ops

services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      PORT: "8000"
      DATA_DIR: /data
      WHATSAPP_BRIDGE_URL: http://whatsapp_bridge:3939
      DJANGO_WHATSAPP_BRIDGE_CAN_SPAWN: "0"
      DJANGO_WHATSAPP_BRIDGE_AUTO_START: "0"
      DJANGO_WHATSAPP_BRIDGE_WAIT_ON_START: "1"
      KOBIOPS_COMPOSE_STACK: "1"
      DJANGO_ENSURE_SUPERADMIN: ${DJANGO_ENSURE_SUPERADMIN:-1}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-}
      SERVICE_FQDN_APP: ${SERVICE_FQDN_APP:-}
      SERVICE_URL_APP: ${SERVICE_URL_APP:-}
    env_file:
      - path: .env
        required: false
    volumes:
      - gy_data:/data
    depends_on:
      whatsapp_bridge:
        condition: service_started

  whatsapp_bridge:
    build:
      context: ../..
      dockerfile: deploy/whatsapp-bridge/Dockerfile
    restart: unless-stopped
    expose:
      - "3939"
    shm_size: "512mb"
    volumes:
      - whatsapp_session:/app/session

volumes:
  gy_data:
    name: kobiops_gy_data
  whatsapp_session:
    name: kobiops_whatsapp_session
